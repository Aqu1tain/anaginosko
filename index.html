<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#16181d" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="description" content="Biblion — lire le grec koinè du Nouveau Testament, lettre par lettre." />
    <title>Biblion — lire le grec koinè</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("biblion:dark");
          var dark =
            stored === null
              ? matchMedia("(prefers-color-scheme: dark)").matches
              : JSON.parse(stored);
          document.documentElement.setAttribute(
            "data-theme",
            dark ? "biblion-dark" : "biblion",
          );
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "biblion");
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
