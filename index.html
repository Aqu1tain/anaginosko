<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#16181d" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Anaginosko" />
    <meta name="description" content="Anaginosko · lire le grec koinè du Nouveau Testament, lettre par lettre." />
    <title>Anaginosko · lire le grec koinè</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("anaginosko:dark");
          var dark =
            stored === null
              ? matchMedia("(prefers-color-scheme: dark)").matches
              : JSON.parse(stored);
          document.documentElement.setAttribute(
            "data-theme",
            dark ? "anaginosko-dark" : "anaginosko",
          );
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "anaginosko");
        }
      })();
    </script>
    <div id="root"></div>
    <noscript>
      <h1>Anaginosko · lire le grec koinè</h1>
      <p>
        Application de lecture du Nouveau Testament en grec koinè (prononciation
        érasmienne et restituée, alphabet interactif). Elle nécessite JavaScript.
      </p>
      <p>
        Version texte intégrale, lisible sans JavaScript :
        <a href="/corpus.html">corpus complet</a>.
      </p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
